# This file is our workflows. It takes the sdk from a public git repo release
name: Build & Test ATAK Plugin

on:
  push:
    branches:
      - main
      - TrapperTesting
      - aaron-testing
  pull_request:
    branches:
      - main
      - TrapperTesting
      - aaron-testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9862592

      - name: Install SDK Platform 33 and Build Tools
        run: |
          sdkmanager "platforms;android-33" "build-tools;30.0.3"

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Download ATAK SDK from GitHub Release
        run: |
          curl -L \
            -o ATAK-CIV-SDK.zip \
            https://github.com/trafryda/ATAKSDK/releases/download/v1.0.0/ATAK-CIV-5.3.0.12-SDK-Zip.zip
          unzip ATAK-CIV-SDK.zip -d ATAK-CIV-SDK

      - name: Copy repository to expected location
        run: |
          mv !(ATAK-CIV-SDK) ./ATAK-CIV-SDK/plugins/Capstone-Plugin
          cd ./ATAK-CIV-SDK/plugins/Capstone-Plugin
#      - name: Copy atak-gradle-takdev.jar to expected location
#        run: |
#          mkdir -p ../../
#          cp ATAK-CIV-5.3.0.12-SDK/ATAK-CIV-5.3.0.12-SDK/atak-gradle-takdev.jar ../../atak-gradle-takdev.jar

      - name: Grant execute permissions to Gradle
        run: chmod +x gradlew

      - name: Build Debug
        run: ./gradlew assembleCivDebug --quiet --no-daemon

      - name: Build Release
        run: ./gradlew assembleCivRelease --quiet --no-daemon

      - name: Run Debug Unit Tests
        run: ./gradlew testCivDebugUnitTest --quiet --no-daemon

      - name: Run Release Unit Tests
        run: ./gradlew testCivReleaseUnitTest --quiet --no-daemon