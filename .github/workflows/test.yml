name: Build & Test ATAK Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install ATAK SDK
        run: |
          mkdir -p /home/runner/work/atak-sdk
          cp -r $GITHUB_WORKSPACE/ATAK-CIV-5.3.0.12-SDK /home/runner/work/atak-sdk
          echo "ATAK SDK installed"

      - name: Ensure ATAK Plugin Exists
        run: |
          ls -al /home/runner/work/atak-sdk
          echo "Checking if atak-gradle-takdev.jar exists..."
          if [ ! -f "/home/runner/work/atak-sdk/atak-gradle-takdev.jar" ]; then
            echo "ERROR: atak-gradle-takdev.jar not found!"
            exit 1
          fi

      - name: Grant execute permissions to Gradle
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew build --info --stacktrace
