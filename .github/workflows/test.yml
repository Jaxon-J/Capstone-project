name: Build & Test ATAK Plugin

on:
  push:
    branches:
      - main
      - TrapperTesting
  pull_request:
    branches:
      - main
      - TrapperTesting

jobs:
  build:
    runs-on: ubuntu-latest  # GitHub-hosted Linux runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Create local.properties
        run: |
          echo "atak.sdk.dir=$GITHUB_WORKSPACE/ATAK-CIV-5.3.0.12-SDK" > local.properties
          cat local.properties  # Print the file to verify it exists

      - name: Verify SDK Path
        run: ls -l $GITHUB_WORKSPACE

      - name: Grant execute permissions to Gradle
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew build --info --stacktrace
